apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculadora-aritmetica
  labels:
    app: calculadora-aritmetica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculadora-aritmetica
  template:
    metadata:
      labels:
        app: calculadora-aritmetica
    spec:
      nodeSelector:
        role: calculadoraAritmetica
      containers:
        - name: calculadora-aritmetica
          image: ycd17/calculadora-aritmetica:1.0
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /salud
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /salud
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: calculadora-aritmetica-svc
spec:
  type: NodePort
  selector:
    app: calculadora-aritmetica
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30001
