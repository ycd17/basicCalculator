<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 { font-size: 1.1rem; color: #333; text-align: center; }

    #expresion {
      width: 100%;
      padding: 12px;
      font-size: 1.4rem;
      text-align: right;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      background: #fafafa;
      cursor: default;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 16px;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.96); }

    .btn-num  { background: #e8f0fe; color: #1a73e8; }
    .btn-num:hover  { background: #d2e3fc; }

    .btn-op   { background: #fce8e6; color: #d93025; }
    .btn-op:hover   { background: #f5c6c3; }

    .btn-equal { background: #1a73e8; color: white; grid-column: span 3; }
    .btn-equal:hover { background: #1557b0; }

    .btn-clear { background: #e6f4ea; color: #188038; grid-column: span 3; }
    .btn-clear:hover { background: #ceead6; }

    #resultado {
      min-height: 36px;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 1.1rem;
      color: #1e7e34;
      text-align: right;
      border-left: 4px solid transparent;
      transition: border-color 0.2s;
    }

    #resultado.ok { border-color: #34a853; }

    #mensaje-error {
      min-height: 24px;
      font-size: 0.9rem;
      color: #c62828;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>Calculadora</h1>
    <input id="expresion" type="text" readonly placeholder="0">
    <div class="buttons">
      <button class="btn-num" data-testid="btn-7" onclick="agregar('7')">7</button>
      <button class="btn-num" data-testid="btn-8" onclick="agregar('8')">8</button>
      <button class="btn-num" data-testid="btn-9" onclick="agregar('9')">9</button>
      <button class="btn-num" data-testid="btn-4" onclick="agregar('4')">4</button>
      <button class="btn-num" data-testid="btn-5" onclick="agregar('5')">5</button>
      <button class="btn-num" data-testid="btn-6" onclick="agregar('6')">6</button>
      <button class="btn-num" data-testid="btn-1" onclick="agregar('1')">1</button>
      <button class="btn-num" data-testid="btn-2" onclick="agregar('2')">2</button>
      <button class="btn-num" data-testid="btn-3" onclick="agregar('3')">3</button>
      <button class="btn-num" data-testid="btn-0" onclick="agregar('0')">0</button>
      <button class="btn-op"  data-testid="btn-mas" onclick="agregarSuma()" style="grid-column: span 2;">+</button>
      <button class="btn-equal" data-testid="btn-igual" onclick="calcular()">=</button>
      <button class="btn-clear" data-testid="btn-borrar" onclick="borrar()">C</button>
    </div>
    <div id="resultado"></div>
    <p id="mensaje-error"></p>
  </div>

  <script>
    const API_URL     = "/sumar";
    const expresion   = document.getElementById("expresion");
    const resultado   = document.getElementById("resultado");
    const mensajeError = document.getElementById("mensaje-error");

    const formatNum = (n) => n % 1 === 0 ? String(Math.round(n)) : String(n);

    const agregar = (digito) => {
      expresion.value += digito;
      mensajeError.textContent = "";
    };

    const agregarSuma = () => {
      if (!expresion.value.trim() || expresion.value.trimEnd().endsWith("+")) return;
      expresion.value += " + ";
      mensajeError.textContent = "";
    };

    const borrar = () => {
      expresion.value = "";
      resultado.textContent = "";
      resultado.className = "";
      mensajeError.textContent = "";
    };

    async function calcular() {
      if (!expresion.value.trim()) {
        resultado.textContent = "";
        resultado.className = "";
        mensajeError.textContent = "Ingresa una expresión";
        return;
      }

      try {
        const res  = await fetch(API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ dato: expresion.value }),
        });
        const data = await res.json();

        if (res.ok) {
          resultado.textContent = `= ${formatNum(data.resultado)}`;
          resultado.className   = "ok";
          mensajeError.textContent = "";
        } else {
          resultado.textContent = "";
          resultado.className   = "";
          mensajeError.textContent = data.detail ?? "Error en el servidor";
        }
      } catch {
        resultado.textContent = "";
        resultado.className   = "";
        mensajeError.textContent = "No se pudo conectar con la API";
      }
    }
  </script>
</body>
</html>
